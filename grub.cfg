set timeout=5
set default=0

insmod all_video
insmod video
insmod video_fb

menuentry "Aegis OS Core (Grafik Modu 1024x768)" {
    set gfxpayload="1024x768x32,1024x768"
    multiboot2 /boot/aegis_core.bin
    boot
}

menuentry "Aegis OS Core (Metin Modu / Güvenli Mod)" {
    set gfxpayload=text
    multiboot2 /boot/aegis_core.bin
    boot
}
